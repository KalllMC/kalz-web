<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KALZX</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#020617;
    color:#cbd5ff;
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
}

/* BACKGROUND GLOW */
body::before{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    background:radial-gradient(circle,#3b82f6,transparent);
    top:10%;
    left:10%;
    filter:blur(140px);
    opacity:0.25;
    animation:moveGlow 10s infinite alternate ease-in-out;
}
@keyframes moveGlow{
    0%{transform:translate(0,0);}
    100%{transform:translate(200px,100px);}
}

/* NAV */
.nav{
    display:flex;
    justify-content:center;
    padding:20px;
}
.nav-box{
    width:90%;
    max-width:900px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 20px;
    border-radius:50px;
    border:1px solid rgba(59,130,246,0.4);
    background:rgba(10,15,30,0.6);
}
.logo{
    font-family:'Orbitron';
    color:#60a5fa;
}
.menu-btn{
    background:#3b82f6;
    padding:6px 10px;
    border-radius:50%;
    cursor:pointer;
}

/* HERO */
#hero{
    text-align:center;
    padding:120px 20px;
    transition:.4s;
}
#hero.hide{
    opacity:0;
    transform:translateY(-20px);
}

/* TEXT ANIMATION */
.title{
    font-family:'Orbitron';
    font-size:90px;
}
.title span{
    transition:0.3s;
    color:#e2e8f0;
}
.title span.active{
    color:#3b82f6;
    text-shadow:0 0 15px #3b82f6;
}

/* SUBTEXT */
.subtext{
    margin-top:10px;
    font-size:14px;
    color:#93c5fd;
}

/* BUTTON */
.btn{
    margin-top:25px;
    padding:14px 30px;
    border:none;
    border-radius:30px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    transition:.2s;
}
.btn:hover{transform:scale(1.05);}
.btn:active{transform:scale(0.95);}

/* OVERLAY */
#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    opacity:0;
    pointer-events:none;
    transition:.3s;
}
#overlay.active{
    opacity:1;
    pointer-events:auto;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    right:-320px;
    top:0;
    width:320px;
    height:100%;
    background:#020617;
    border-left:1px solid rgba(59,130,246,0.2);
    transition:.4s;
    z-index:10;
}
.sidebar.active{right:0;}

.side-top{
    padding:20px;
    border-bottom:1px solid rgba(59,130,246,0.2);
    position:relative;
}
.close-btn{
    position:absolute;
    right:15px;
    top:15px;
    cursor:pointer;
}

.menu{
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}
.item{
    padding:12px;
    border-radius:10px;
    cursor:pointer;
}
.item:hover{
    background:rgba(59,130,246,0.2);
}

/* PANEL */
#panel{
    display:none;
    padding:50px 20px;
}
#panel.active{
    display:block;
    animation:fadeIn .3s ease;
}
@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

.tabs{text-align:center;}
.tab{
    padding:10px 20px;
    border:1px solid #3b82f6;
    border-radius:30px;
    margin:5px;
    cursor:pointer;
}
.tab.active{background:#3b82f6;}

.cards{display:none;justify-content:center;margin-top:30px;}
.cards.active{display:flex;}

.product-card{
    width:320px;
    padding:20px;
    border-radius:20px;
    border:1px solid rgba(59,130,246,0.3);
}

/* BUTTON */
.buy{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

/* POPUP */
.popup{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:20;
}
.popup.active{display:flex;}

.popup-box{
    width:90%;
    max-width:400px;
    background:#1f2937;
    border-radius:20px;
    padding:20px;
    position:relative;
}
.close-pop{
    position:absolute;
    right:15px;
    top:15px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="overlay" onclick="closeAll()"></div>

<!-- NAV -->
<div class="nav">
<div class="nav-box">
<div class="logo">KALZX</div>
<div class="menu-btn" onclick="openMenu()">☰</div>
</div>
</div>

<!-- HERO -->
<section id="hero">
<h1 class="title">
<span>K</span><span>A</span><span>L</span><span>Z</span><span>X</span>
</h1>

<div class="subtext">
premium panel smooth & safe only one in Kalz Project
</div>

<button class="btn" onclick="goPanel()">LIHAT CHEAT</button>
</section>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
<div class="side-top">
<h2>KALZX</h2>
<p>premium panel v1.0</p>
<div class="close-btn" onclick="closeAll()">✖</div>
</div>

<div class="menu">
<div class="item" onclick="goHome()">Home</div>
<div class="item" onclick="goPanel()">List Cheat</div>
</div>
</div>

<!-- PANEL -->
<section id="panel">
<h1 style="text-align:center;">Panel VIP</h1>

<div class="tabs">
<span class="tab active" onclick="switchTab('pc',this)">KALZ PC</span>
<span class="tab" onclick="switchTab('andro',this)">KALZ ANDRO</span>
</div>

<div id="pc" class="cards active">
<div class="product-card">
<h3>REMOTE PANEL PC</h3>
<button class="buy">BELI</button>
</div>
</div>

<div id="andro" class="cards">
<div class="product-card">
<h3>REMOTE PANEL ANDRO</h3>
<button class="buy">BELI</button>
</div>
</div>

</section>

<script>
/* TEXT ANIMATION PINDAH */
const letters = document.querySelectorAll('.title span');
let index = 0;

setInterval(()=>{
    letters.forEach(l=>l.classList.remove('active'));
    letters[index].classList.add('active');
    index = (index + 1) % letters.length;
},500);

/* MENU */
function openMenu(){
    sidebar.classList.add("active");
    overlay.classList.add("active");
}

function closeAll(){
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
}

function goPanel(){
    hero.classList.add("hide");
    setTimeout(()=>{
        hero.style.display="none";
        panel.classList.add("active");
    },300);
}

function goHome(){
    panel.classList.remove("active");
    hero.style.display="block";
    setTimeout(()=>hero.classList.remove("hide"),10);
    closeAll();
}

function switchTab(tab,el){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');

    document.querySelectorAll('.cards').forEach(c=>c.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
}
</script>

</body>
</html>
